# Local dev infrastructure for the backend. Start with:
#   docker compose -f docker/compose.yaml up -d
# (or `pnpm setup` once the bootstrap script lands — Phase 8).
#
# Apps run on the host (pnpm dev); only infrastructure runs in containers.
# The optional `pgbouncer` profile fronts Postgres in transaction mode to
# mirror production pooling: `docker compose --profile pgbouncer up -d`.

# Compose project name = the Docker volume/network namespace. This MUST NOT be
# the skeleton's name, or perimetra shares volumes (postgres-data, minio-data, …)
# with every other skeleton-stamped repo on this machine → cross-project data
# bleed. The committed default is what makes a FRESH CLONE safe: docker/.env also
# sets COMPOSE_PROJECT_NAME (for the host-port remap) but is gitignored, so
# before this line the isolation existed only on boxes that happened to have that
# untracked file. The env var, when set, still wins by Compose precedence.
name: ${COMPOSE_PROJECT_NAME:-perimetra}

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # noeviction is a BullMQ requirement: evicting job keys corrupts queues.
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  centrifugo:
    image: centrifugo/centrifugo:v6.8.2
    command: ["centrifugo", "--config", "/centrifugo/config.json"]
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro
    ports:
      - "${CENTRIFUGO_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q -O - http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-dev-password
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000" # S3 API
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001" # console UI
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: creates the default bucket, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio-dev-password &&
      mc mb --ignore-existing local/app &&
      exit 0
      "

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_SMTP_HOST_PORT:-1025}:1025" # SMTP
      - "${MAILPIT_WEB_HOST_PORT:-8025}:8025" # web UI
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8025/livez"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:latest
    profiles: ["pgbouncer"]
    environment:
      DB_HOST: postgres
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: app
      POOL_MODE: transaction
      LISTEN_PORT: "6432"
      AUTH_TYPE: scram-sha-256
    ports:
      - "${PGBOUNCER_HOST_PORT:-6432}:6432"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
