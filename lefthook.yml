# Lefthook config — git hooks for the monorepo.
# https://lefthook.dev/configuration/index.html
#
# Philosophy: pre-commit stays cheap (format only) so committing isn't a chore;
# pre-push runs the correctness gates — lint + typecheck + unit tests — so a red
# gate is caught locally instead of riding a direct (non-PR) push onto a deploy
# branch, where CI (which fires on PRs + push:main only) never sees it. `build`
# stays CI-only: it is the slow gate, a broken build fails the platform deploy
# anyway, and adding it here would nudge people to `--no-verify`. Override
# per-machine with LEFTHOOK=0 or `--no-verify`.

pre-commit:
  parallel: true
  jobs:
    - name: prettier
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,md,yml,yaml,css}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    # Reject raw control bytes in staged source — a single literal NUL flips
    # the file to git-binary and every diff-based review then silently skips
    # it. Escape sequences ("\x00") are the correct spelling. --staged asks
    # git for the file list itself (no glob to maintain, no ARG_MAX ceiling);
    # CI runs the same check tree-wide. See scripts/check-control-chars.mjs.
    - name: control-chars
      run: pnpm check:control-chars --staged
    # Secret scan of the STAGED diff (ADR 0044) — catches a leaked key before
    # it ever becomes a commit (rewriting history after the fact is the
    # expensive path). Degrades gracefully: gitleaks is a single Go binary
    # (`brew install gitleaks` / https://github.com/gitleaks/gitleaks#installing)
    # and machines without it just skip — CI scans every PR regardless, so
    # nothing slips through. Config/allowlist: `.gitleaks.toml` (repo root,
    # auto-detected; same file CI uses).
    - name: gitleaks
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks git --pre-commit --staged --redact
        else
          echo "[gitleaks] binary not installed — skipping local secret scan (CI still scans every PR)"
        fi

pre-push:
  parallel: true
  jobs:
    # Cheap, dependency-free: catch orphan stale react-native dirs (a hoisted-
    # linker residue that shadows @react-native/codegen and breaks the mobile
    # build) before they reach CI. See scripts/check-no-orphan-rn.mjs.
    - name: no-orphan-rn
      run: pnpm check:no-orphan-rn
    - name: lint
      run: pnpm turbo run lint
    - name: check-types
      run: pnpm turbo run check-types
    # Unit + component tests (turbo-cached → a no-op when nothing changed). Here
    # because a direct push to a deploy branch (e.g. `stage`) runs NO CI — CI
    # fires on PRs + push:main only — so without this a red test ships unnoticed
    # (finding 2026-07-02). See ADR 0106 (drained from skeleton ADR 0048).
    - name: test
      run: pnpm turbo run test
