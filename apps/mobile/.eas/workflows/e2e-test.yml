name: e2e-test

# Build the app on EAS and run the Maestro smoke flow against it, per platform
# (ADR 0005). Runs on PRs once `eas init` links a project — it cannot run on the
# local dev box (no device/simulator/cloud), so it is not part of `turbo test`.
on:
  pull_request:
    branches: ["*"]

jobs:
  build_android:
    type: build
    params:
      platform: android
      profile: e2e-test

  maestro_android:
    needs: [build_android]
    type: maestro
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      flow_path: [".maestro/smoke.yml"]

  build_ios:
    type: build
    params:
      platform: ios
      profile: e2e-test

  maestro_ios:
    needs: [build_ios]
    type: maestro
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      flow_path: [".maestro/smoke.yml"]
